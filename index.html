<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDIOTEC SENAC - 1º ANO E - GITHUB E HTML</title>

<style>
:root {
  --bg-dark: #ff91a4;
  --bg-panel: #ff91a4;;
  --border-blue: #f26b81;
  --neon-blue: #f26b81;
  --senac-orange: #c40424;
  --text-main: #f26b81;
  --text-muted: #f26b81;
  --shadow-blue: rgba(37, 150, 190);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  font-family: "Courier New", monospace;
  color: var(--text-main);
  background: radial-gradient(circle at center, #0c1c35 0%, var(--bg-dark) 70%);
  padding: 24px;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: linear-gradient(rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, .25) 50%);
  background-size: 100% 4px;
  opacity: .15;
  pointer-events: none;
}

.shell {
  width: min(1400px, 100%);
  margin: auto;
}

.dashboard {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 24px;
}

.sidebar {
  background: var(--bg-panel);
  border: 2px solid var(--border-blue);
  box-shadow: 0 8px 32px rgba(0, 0, 0, .5);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  position: relative;
}

.sidebar::before {
  content: "MISSION_STATUS: ONLINE";
  position: absolute;
  bottom: 12px;
  left: 20px;
  font-size: .7rem;
  color: var(--senac-orange);
  letter-spacing: 1px;
}

.system-title {
  font-size: 1.8rem;
  font-weight: 900;
  text-transform: uppercase;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.system-title span {
  display: inline-block;
  width: max-content;
  color: var(--senac-orange);
  border: 1px solid var(--senac-orange);
  padding: 4px 8px;
  font-size: .8rem;
}

.system-title span.location {
  color: #fff;
  border-color: var(--border-blue);
  background-color: var(--border-blue);
}

.sys-stat-box {
  border-left: 3px solid var(--border-blue);
  padding-left: 12px;
  color: var(--text-muted);
  font-size: .85rem;
}

.sys-stat-box div {
  margin-bottom: 8px;
}

.sys-stat-box b {
  color: var(--text-main);
}

.main-console {
  background: var(--bg-panel);
  border: 2px solid var(--border-blue);
  box-shadow: 0 12px 40px var(--shadow-blue);
  padding: 35px;
}

.console-header {
  border-bottom: 1px solid var(--border-blue);
  margin-bottom: 25px;
  padding-bottom: 15px;
}

.console-header h2 {
  color: var(--senac-orange);
  text-transform: uppercase;
  letter-spacing: 2px;
}

.console-manifesto {
  background: rgba(0, 0, 0, .35);
  border: 1px solid var(--border-blue);
  padding: 25px;
  line-height: 1.8;
  margin-bottom: 30px;
}

.console-manifesto ul {
  margin-top: 15px;
  margin-left: 20px;
}

.console-manifesto li {
  margin-bottom: 8px;
}

.section-label {
  color: var(--text-muted);
  font-size: .75rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 15px;
}

.action-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

.action-btn {
  background: #09111d;
  border: 2px solid var(--border-blue);
  color: white;
  padding: 18px;
  min-height: 90px;
  cursor: pointer;
  text-align: left;
  transition: .2s;
  position: relative;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.action-btn:hover {
  border-color: var(--senac-orange);
  transform: translateY(-3px);
  box-shadow: 0 0 20px rgba(245, 130, 32, .25);
}

.action-btn::after {
  content: "//";
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--neon-blue);
}

.action-btn:hover::after {
  color: var(--senac-orange);
}

.btn-title {
  display: block;
  font-weight: 900;
  margin-bottom: 6px;
}

.btn-subtitle {
  color: var(--text-muted);
  font-size: .8rem;
}

.footer-box {
  margin-top: 30px;
  border-top: 1px solid var(--border-blue);
  padding-top: 20px;
  color: var(--text-muted);
  line-height: 1.7;
}

@media(max-width: 900px) {
  .dashboard {
    grid-template-columns: 1fr;
  }
  .action-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<main class="shell">
  <div class="dashboard">

    <aside class="sidebar">
      <h1 class="system-title">
        MEDIOTEC SENAC
        <span class="location">Recife</span>
        <span>1º ANO E</span>
      </h1>

      <div class="sys-stat-box">
        <div>ALUNO: <b>MELO DANTAS</b></div>
        <div>MISSÃO: <b>GITHUB + HTML</b></div>
      </div>


      <div class="footer-box">
        <strong>GERAL</strong>
        <br><br>
        Jogos que gosto: Gnosia, Lily's well, Paper Lily, Pocket mirror, Deltarune, Roblox Daybreak. <br>
        Projetos que estou trabalhando: Internet: Fake
      </div>
    </section>

  </div>
</main>

</body>
</html>
